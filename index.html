<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT - Simulasi UPK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMASI BACKGROUND BERGERAK --- */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%);
        }

        .animated-bg li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(37, 99, 235, 0.1); /* Biru transparan */
            animation: animateBg 25s linear infinite;
            bottom: -150px;
            border-radius: 4px;
        }

        /* Posisi dan ukuran acak untuk partikel */
        .animated-bg li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .animated-bg li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .animated-bg li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .animated-bg li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; border-radius: 50%; }
        .animated-bg li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .animated-bg li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; border-radius: 50%; }
        .animated-bg li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .animated-bg li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .animated-bg li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; border-radius: 50%; }
        .animated-bg li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animateBg {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* --- KOTAK KONTEN --- */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .card-header h1 {
            font-size: 24px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- FORM LOGIN --- */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f8fafc;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .toggle-password {
            position: absolute;
            top: 38px;
            right: 15px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
        }

        .toggle-password:hover { color: var(--text-main); }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn:hover { background-color: var(--primary-hover); }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* --- KUIS & SOAL --- */
        #quiz-section, #result-section { display: none; }

        .exam-info {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }

        .exam-info span { font-weight: 600; color: var(--primary); }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .option-label:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .option-label input[type="radio"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* --- HASIL --- */
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f0fdf4;
            border: 5px solid var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: 700;
            color: var(--success);
        }

        .result-text {
            text-align: center;
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Responsif */
        @media (max-width: 600px) {
            .card { padding: 25px 20px; }
            .exam-info { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <ul class="animated-bg">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="container">
        
        <div class="card" id="login-section">
            <div class="card-header">
                <h1>Computer Based Test (CBT)</h1>
                <p>Portal Simulasi Ujian Penilaian Kompetensi 2026</p>
            </div>
            
            <div class="form-group">
                <label for="nama">Nama Peserta</label>
                <input type="text" id="nama" class="form-control" placeholder="Ketik nama lengkap Anda" required>
            </div>
            
            <div class="form-group">
                <label for="token">Token Ujian</label>
                <input type="password" id="token" class="form-control" placeholder="Masukkan token akses" required>
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                <div class="error-msg" id="error-msg"><i class="fas fa-exclamation-circle"></i> Token tidak valid. Periksa kembali.</div>
            </div>
            
            <button class="btn" onclick="login()">Mulai Ujian</button>
        </div>

        <div class="card" id="quiz-section">
            <div class="exam-info">
                <div>Peserta: <span id="display-nama"></span></div>
                <div>Status: <span>Ujian Berlangsung</span></div>
            </div>
            <div id="quiz-container"></div>
            <button class="btn" onclick="submitQuiz()" style="margin-top: 20px;">Selesai & Kumpulkan</button>
        </div>

        <div class="card" id="result-section">
            <div class="card-header">
                <h1>Ujian Selesai</h1>
                <p>Terima kasih telah mengikuti simulasi CBT.</p>
            </div>
            <div class="score-circle" id="score-display">0</div>
            <p class="result-text" id="result-message"></p>
            <button class="btn" onclick="location.reload()">Kembali ke Beranda</button>
        </div>

    </div>

    <script>
        const validToken = "Simulasi 2026";
        let userName = "";

        const questions = [
            { q: "Apa warna langit pada siang hari yang cerah?", options: ["Hijau", "Biru", "Ungu", "Merah muda"], answer: 1 },
            { q: "Hewan peliharaan apa yang dikenal suka mengeong?", options: ["Ayam", "Sapi", "Kucing", "Bebek"], answer: 2 },
            { q: "Hasil dari 1 ditambah 1 adalah?", options: ["2", "5", "10", "11"], answer: 0 },
            { q: "Benda apa yang paling umum digunakan untuk melihat waktu?", options: ["Sepatu", "Piring", "Jam", "Kipas angin"], answer: 2 },
            { q: "Apa nama planet yang kita tinggali saat ini?", options: ["Mars", "Bumi", "Jupiter", "Saturnus"], answer: 1 },
            { q: "Lawan kata dari 'siang' adalah?", options: ["Pagi", "Sore", "Malam", "Cerah"], answer: 2 },
            { q: "Air biasa yang dibekukan di dalam lemari es akan berubah menjadi?", options: ["Uap", "Es batu", "Sirup", "Awan"], answer: 1 },
            { q: "Kendaraan bermotor beroda empat yang biasa melaju di jalan raya disebut?", options: ["Sepeda", "Pesawat", "Perahu", "Mobil"], answer: 3 },
            { q: "Matahari selalu terbit dari sebelah mana?", options: ["Utara", "Selatan", "Barat", "Timur"], answer: 3 },
            { q: "Rasa dari gula pasir adalah?", options: ["Asin", "Pahit", "Pedas", "Manis"], answer: 3 }
        ];

        // Fitur Lihat Sandi (Token)
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#token');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Validasi Login
        function login() {
            const inputNama = document.getElementById("nama").value.trim();
            const inputToken = document.getElementById("token").value;
            const errorMsg = document.getElementById("error-msg");

            if (inputNama === "") {
                alert("Harap isi Nama Peserta terlebih dahulu.");
                return;
            }

            if (inputToken === validToken) {
                userName = inputNama;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("quiz-section").style.display = "block";
                document.getElementById("display-nama").innerText = userName;
                renderQuiz();
            } else {
                errorMsg.style.display = "block";
            }
        }

        // Render Soal ke HTML
        function renderQuiz() {
            const quizContainer = document.getElementById("quiz-container");
            let html = "";
            
            questions.forEach((q, index) => {
                html += `
                    <div class="question-box">
                        <div class="question-text">${index + 1}. ${q.q}</div>
                        <div class="options">
                `;
                
                q.options.forEach((opt, i) => {
                    html += `
                        <label class="option-label">
                            <input type="radio" name="q${index}" value="${i}">
                            <span>${opt}</span>
                        </label>
                    `;
                });
                
                html += `</div></div>`;
            });
            
            quizContainer.innerHTML = html;
        }

        // Hitung Skor
        function submitQuiz() {
            let score = 0;
            let answeredCount = 0;

            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected) {
                    answeredCount++;
                    if (parseInt(selected.value) === q.answer) {
                        score += 10; 
                    }
                }
            });

            if (answeredCount < questions.length) {
                const confirmSubmit = confirm(`Anda baru menjawab ${answeredCount} dari ${questions.length} soal. Yakin ingin mengakhiri ujian?`);
                if (!confirmSubmit) return;
            }

            document.getElementById("quiz-section").style.display = "none";
            document.getElementById("result-section").style.display = "block";
            
            document.getElementById("score-display").innerText = score;
            document.getElementById("result-message").innerText = `Atas nama ${userName}, data jawaban Anda telah tersimpan di sistem.`;
        }
    </script>
</body>
</html>
